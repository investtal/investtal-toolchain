# @investtal/proto-plugins — kubectl
#
# Vendored proto TOML plugin for kubectl (Kubernetes CLI).
# Owned + audited by Investtal so our toolchain never resolves a plugin from an
# uncontrolled third-party repo.
#
# Provenance : forked from ageha734/proto-plugins (toml/kubectl.toml)
# Audited     : 2026-06-23
# Upstream    : https://github.com/kubernetes/kubectl
# Integrity   : upstream ships per-binary SHA256 at
#               https://dl.k8s.io/release/v{version}/bin/{platform}/{arch}/kubectl.sha256
#               proto TOML plugins do not support per-binary checksum-url yet —
#               no aggregate checksums.txt exists. Checksum not wired in.
#
# Docs: https://moonrepo.dev/docs/proto/non-wasm-plugin

name = "kubectl"
type = "cli"

[resolve]
git-url = "https://github.com/kubernetes/kubectl"
git-tag-pattern = "^(?:v|kubernetes-)(.*)$"

[platform.linux]
download-file = "linux/{arch}/kubectl"
bin-path = "kubectl"

[platform.macos]
download-file = "darwin/{arch}/kubectl"
bin-path = "kubectl"

[platform.windows]
download-file = "windows/{arch}/kubectl.exe"
bin-path = "kubectl.exe"

[install]
download-url = "https://dl.k8s.io/release/v{version}/bin/{download_file}"
unpack = false

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"
