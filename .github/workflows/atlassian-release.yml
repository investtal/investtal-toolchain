# Cross-platform release for the atlassian Zig CLI.
#
# Supply-chain hardening:
# - Every third-party Action is pinned to a full commit SHA (immutable).
# - Version tags are comments only — never used at runtime.
# - Runner images use exact labels (no *-latest floating aliases).
# - Zig compiler version is an exact semver (setup-zig verifies the download).
#
# To refresh pins: resolve tag → commit with
#   gh api repos/<owner>/<name>/git/ref/tags/<tag>
# then dereference annotated tags to the target commit SHA.

name: atlassian-release

on:
  push:
    tags:
      - "atlassian-v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-linux-gnu
            asset_os: linux
            asset_arch: amd64
            ext: tar.gz
          - os: ubuntu-24.04
            target: aarch64-linux-gnu
            asset_os: linux
            asset_arch: arm64
            ext: tar.gz
          - os: macos-15
            target: x86_64-macos
            asset_os: macos
            asset_arch: amd64
            ext: tar.gz
          - os: macos-15
            target: aarch64-macos
            asset_os: macos
            asset_arch: arm64
            ext: tar.gz
          - os: windows-2025
            target: x86_64-windows
            asset_os: windows
            asset_arch: amd64
            ext: zip
          - os: windows-2025
            target: aarch64-windows
            asset_os: windows
            asset_arch: arm64
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      # actions/checkout@v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # mlugg/setup-zig@v2.2.1 — installs exact Zig version below
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          # Exact release; do not use "latest" / "master".
          version: "0.16.0"

      - name: Build
        working-directory: atlassian
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Package (unix)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#atlassian-v}"
          BIN=atlassian/zig-out/bin/atlassian
          NAME="atlassian_${VERSION}_${{ matrix.asset_os }}_${{ matrix.asset_arch }}"
          mkdir -p dist
          cp "$BIN" "dist/atlassian"
          tar -C dist -czf "${NAME}.tar.gz" atlassian
          echo "ASSET=${NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.ext == 'zip'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#atlassian-v}"
          BIN=atlassian/zig-out/bin/atlassian.exe
          NAME="atlassian_${VERSION}_${{ matrix.asset_os }}_${{ matrix.asset_arch }}"
          mkdir -p dist
          cp "$BIN" "dist/atlassian.exe"
          (cd dist && zip "../${NAME}.zip" atlassian.exe)
          echo "ASSET=${NAME}.zip" >> "$GITHUB_ENV"

      # actions/upload-artifact@v7.0.1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      # actions/checkout@v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/download-artifact@v8.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts

      - name: Flatten + checksums
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#atlassian-v}"
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release
          test -n "$(ls -A .)" || { echo "no release artifacts"; exit 1; }
          # Portable SHA-256 sum file: "<hash>  <filename>"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > "atlassian_${VERSION}_checksums.txt"
          else
            shasum -a 256 * > "atlassian_${VERSION}_checksums.txt"
          fi
          ls -la
          cat "atlassian_${VERSION}_checksums.txt"

      # softprops/action-gh-release@v3.0.2
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
